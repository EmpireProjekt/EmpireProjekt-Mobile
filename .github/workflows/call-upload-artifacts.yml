name: "Build and Upload Artifacts"
on:
  workflow_call:
    secrets:
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      STORE_PASSWORD:
        required: true
      KEYSTORE_BASE64:
        required: true
jobs:
  upload_artifacts:
    name: "Build and Upload (${{ matrix.id }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: "android-apk"
            task: ":instances:androidApp:assembleRelease"
            artifacts_path: "./instances/androidApp/build/outputs/apk/release"
          - id: "wear-apk"
            task: ":instances:wearApp:assembleRelease"
            artifacts_path: "./instances/wearApp/build/outputs/apk/release"
          - id: "android-aab"
            task: ":instances:androidApp:bundleRelease"
            artifacts_path: "./instances/androidApp/build/outputs/bundle/release"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Read Project Properties"
        id: properties
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: './gradle.properties'
          properties: 'klibs.project.name klibs.project.version.string'
      - name: "Set Up JDK 21"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: "Give Gradle Permission"
        run: chmod +x gradlew
      - name: "Build ${{ matrix.id }}"
        uses: gradle/gradle-build-action@v3
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        with:
          arguments: ${{ matrix.task }} --stacktrace
      - name: "Upload ${{ matrix.id }}"
        uses: actions/upload-artifact@6027e3dd177782cd8ab9af838c04fd81a07f1d47
        with:
          name: ${{ matrix.id }}
          path: ${{ matrix.artifacts_path }}
