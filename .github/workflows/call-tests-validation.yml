name: "Tests Validation"
on:
  workflow_call:

jobs:
  tests:
    name: "Run Tests"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Set Up JDK 21"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: "Give Gradle Permission"
        run: chmod +x gradlew
      - name: "Run Tests"
        uses: gradle/gradle-build-action@v3
        with:
          arguments: test
